<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <title>rsFeed - RSS articles reader</title>
  </head>
  <body>
    <section class="side">
      <div class="side-text">
        <div class="side-text-logo">
          <img src="img/logo.svg" alt="" />
          <h1>rsFeed</h1>
        </div>

        <div class="divider"></div>
        <h4>Sources</h4>
      </div>
      <div class="buttons">
        <button data-rss="https://techcrunch.com/feed/">Techcrunch</button>
        <button
          data-rss="https://www.wired.com/feed/category/science/latest/rss"
        >
          Wired
        </button>
        <button data-rss="https://news.ycombinator.com/rss">Hacker News</button>
        <button data-rss="https://www.raptitude.com/feed/">Raptitude</button>
        <button data-rss="http://rss.sciam.com/ScientificAmerican-Global">
          Scientific American
        </button>
        <button
          data-rss="https://habr.com/ru/rss/articles/top/weekly/?limit=25"
        >
          Habr
        </button>
        <button data-rss="https://knife.media/rss" class="button-end">
          Knife
        </button>
      </div>
      <div class="side-links">
        <a href="https://github.com/mxbv/rsFeed">OpenSource</a>
      </div>
    </section>
    <div class="articles"></div>
    <script src="js/app.js"></script>
  </body>
</html>
